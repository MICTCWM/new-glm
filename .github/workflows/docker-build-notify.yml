name: Docker Build & Push with Email Notification

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: new-api

jobs:
  build-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: ${BUILD_TIME}" >> $GITHUB_STEP_SUMMARY
          echo "${VERSION}" > VERSION

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY_HOST }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build Docker image
        id: build
        run: |
          echo "Starting Docker image build..." | tee -a build.log
          echo "Image: ${{ secrets.ALIYUN_REGISTRY_HOST }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" | tee -a build.log
          echo "Platforms: linux/amd64, linux/arm64" | tee -a build.log
          echo "Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" | tee -a build.log
          echo "----------------------------------------" | tee -a build.log

          if docker buildx build \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            --platform linux/amd64,linux/arm64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t ${{ secrets.ALIYUN_REGISTRY_HOST }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            -t ${{ secrets.ALIYUN_REGISTRY_HOST }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest \
            --push \
            . 2>&1 | tee -a build.log; then
            echo "build_status=success" >> $GITHUB_OUTPUT
            echo "Build and push succeeded" | tee -a build.log
          else
            echo "build_status=failed" >> $GITHUB_OUTPUT
            echo "Build or push failed" | tee -a build.log
            exit 1
          fi

          echo "----------------------------------------" | tee -a build.log
          echo "Completed: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" | tee -a build.log

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          username: ${{ secrets.OUTLOOK_SMTP_USERNAME }}
          password: ${{ secrets.OUTLOOK_SMTP_PASSWORD }}
          subject: "Docker Build Success - ${{ env.IMAGE_NAME }} ${{ steps.version.outputs.version }}"
          body: |
            Docker image build and push succeeded!

            Image Info:
            - Name: ${{ secrets.ALIYUN_REGISTRY_HOST }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}
            - Version: ${{ steps.version.outputs.version }}
            - Latest tag: updated
            - Platforms: linux/amd64, linux/arm64
            - Build time: ${{ steps.version.outputs.build_time }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.event.head_commit.message }}
            - Author: ${{ github.event.head_commit.author.name }}

            See attached build.log for details.
          to: ${{ secrets.NOTIFY_EMAIL_RECIPIENT }}
          from: Docker Build Notification
          attachments: build.log

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          username: ${{ secrets.OUTLOOK_SMTP_USERNAME }}
          password: ${{ secrets.OUTLOOK_SMTP_PASSWORD }}
          subject: "Docker Build Failed - ${{ env.IMAGE_NAME }}"
          body: |
            Docker image build or push failed!

            Build Info:
            - Image: ${{ env.IMAGE_NAME }}
            - Target version: ${{ steps.version.outputs.version }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.event.head_commit.message }}
            - Author: ${{ github.event.head_commit.author.name }}

            See attached build.log for error details.
          to: ${{ secrets.NOTIFY_EMAIL_RECIPIENT }}
          from: Docker Build Notification
          attachments: build.log

      - name: Build summary
        if: always()
        run: |
          echo "### Build Result" >> $GITHUB_STEP_SUMMARY
          if [ -f build.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi